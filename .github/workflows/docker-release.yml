name: Docker Release

on:
  push:
    tags:
      - '*.*.*'
    paths:
      - recipe-library/config.yaml
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/nikolausstoll/recipe-library

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # opencv-python-headless has no PyPI wheels for linux/arm/v7 (32-bit ARM); build fails there.
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          build-args: |
            NODE_ENV=production
